  - path: data/dataset/multi-table/gri-qa_multitable3-quant.csv
    split: multitable3_quantitative
  - path: data/dataset/multi-table/gri-qa_multitable3-multistep.csv
    split: multitable3_multistep
  - path: data/dataset/multi-table/gri-qa_multitable5-rel.csv
    split: multitable5_relational
  - path: data/dataset/multi-table/gri-qa_multitable5-quant.csv
    split: multitable5_quantitative
  - path: data/dataset/multi-table/gri-qa_multitable5-multistep.csv
    split: multitable5_multistep

